spring:
  application:
    name: his-backend
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:medcore_db}?sslmode=${DB_SSL_MODE:require}
    username: ${DB_USER:medcore}
    password: ${DB_PASSWORD:medcore_password}
    driver-class-name: org.postgresql.Driver
    
  elasticsearch:
    uris: http://localhost:9200
    
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
